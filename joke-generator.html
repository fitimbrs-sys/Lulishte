<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="joke-container">
        <!-- Header -->
        <header class="joke-header">
            <h1><i class="fas fa-laugh-beam"></i> Joke Generator</h1>
            <p>Get a good laugh with random jokes from our API</p>
        </header>

        <!-- Main Content -->
        <main class="joke-main">
            <!-- Joke Display -->
            <div class="joke-display">
                <div class="joke-card">
                    <div class="joke-type-badge" id="jokeType">Loading...</div>
                    
                    <div class="joke-content">
                        <p class="joke-text" id="jokeText">
                            <i class="fas fa-spinner fa-spin"></i> Fetching a joke for you...
                        </p>
                        <p class="joke-punchline" id="jokePunchline" style="display: none;"></p>
                    </div>

                    <div class="joke-actions">
                        <button class="btn btn-primary" id="getJokeBtn" onclick="getJoke()">
                            <i class="fas fa-sync-alt"></i> Get New Joke
                        </button>
                        <button class="btn btn-secondary" id="togglePunchlineBtn" style="display: none;" onclick="togglePunchline()">
                            <i class="fas fa-eye"></i> Show Punchline
                        </button>
                        <button class="btn btn-icon" onclick="copyJoke()" title="Copy to clipboard">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="btn btn-icon" onclick="shareJoke()" title="Share joke">
                            <i class="fas fa-share-alt"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Filters & Options -->
            <div class="joke-options">
                <div class="option-group">
                    <label for="jokeCategory">Category:</label>
                    <select id="jokeCategory" onchange="updateCategory()">
                        <option value="any">Any</option>
                        <option value="general">General</option>
                        <option value="programming">Programming</option>
                        <option value="knock-knock">Knock Knock</option>
                    </select>
                </div>

                <div class="option-group">
                    <label for="jokeType">Type:</label>
                    <select id="jokeTypeFilter" onchange="updateJokeType()">
                        <option value="any">Any</option>
                        <option value="single">Single</option>
                        <option value="twopart">Two-Part</option>
                    </select>
                </div>

                <div class="option-group checkbox">
                    <label>
                        <input type="checkbox" id="safeMode" checked onchange="toggleSafeMode()">
                        Safe Mode
                    </label>
                </div>
            </div>

            <!-- Statistics -->
            <div class="joke-stats">
                <div class="stat-item">
                    <i class="fas fa-laugh"></i>
                    <span id="jokeCount">0</span>
                    <p>Jokes Fetched</p>
                </div>
                <div class="stat-item">
                    <i class="fas fa-clipboard"></i>
                    <span id="copyCount">0</span>
                    <p>Copied</p>
                </div>
                <div class="stat-item">
                    <i class="fas fa-share"></i>
                    <span id="shareCount">0</span>
                    <p>Shared</p>
                </div>
            </div>

            <!-- History -->
            <div class="joke-history">
                <h2><i class="fas fa-history"></i> Joke History</h2>
                <div class="history-list" id="historyList">
                    <p class="empty-message">No jokes yet. Generate one to get started!</p>
                </div>
                <button class="btn btn-small" onclick="clearHistory()" id="clearHistoryBtn" style="display: none;">
                    <i class="fas fa-trash"></i> Clear History
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="joke-footer">
            <p>Powered by <a href="https://jokeapi.dev/" target="_blank">JokeAPI</a></p>
            <p>Made with <i class="fas fa-heart"></i> for laughter lovers</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="joke-script.js"></script>
</body>
</html>
